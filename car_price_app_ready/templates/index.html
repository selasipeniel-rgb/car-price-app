
<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
</head>
<body>
    <h2>Car Price Prediction</h2>
    <form action="/predict" method="post">
        {% for f in features %}
        <input type="text" name="{{f}}" placeholder="{{f}}" required><br>
        {% endfor %}
        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>
</body>
</html>
