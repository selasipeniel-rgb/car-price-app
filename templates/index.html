<!DOCTYPE html>
<html>
<head>
    <title>AutoValue AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: #f4f6f9;">

<div class="container mt-5">
    <div class="card shadow-lg p-4 rounded-4">

        <h2 class="text-center mb-4">🚗 AutoValue AI</h2>
        <p class="text-center text-muted">Smart Car Price Prediction System</p>

        <form action="/predict" method="post">
            <div class="row">
                {% for f in features %}
                <div class="col-md-6 mb-3">
                    <label class="form-label">{{f}}</label>
                    <input type="number" step="any" name="{{f}}" class="form-control" required>
                </div>
                {% endfor %}
            </div>

            <div class="text-center">
                <button class="btn btn-primary px-4">Predict Price</button>
            </div>
        </form>

        {% if prediction_text %}
        <div class="alert alert-success text-center mt-4">
            <h4>{{ prediction_text }}</h4>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
